[project]
name = "all-for-gemini"
version = "0.1.0"
description = "OpenAI-compatible API proxy for Gemini"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.136.3",
    "uvicorn[standard]>=0.34.0",
    "google-genai>=1.14.0",
    "openai>=2.38.0",
    "tomli>=2.4.1; python_version < '3.12'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["server"]
